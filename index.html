<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="feed-container" id="feedContainer">
    <div class="video-card">
      <div style="position: absolute; width: 100%; height: 100%; background: #0a0512; z-index: 0;"></div>
      <video src="your_placeholder_video.mp4" loop autoplay muted></video>
      
      <div class="top-nav">
        <span>Following</span>
        <span class="active">For You</span>
      </div>

      <div class="video-info">
        <h3 onclick="openProfile('pain X AI', true)">pain X AI <i class="fas fa-check-circle verified-badge"></i></h3>
        <p>Welcome to pain X. Tap my name to start!</p>
      </div>

      <div class="side-buttons">
        <div class="action-btn" id="likeBtn">
          <i class="fas fa-heart"></i>
          <span>12.3K</span>
        </div>
        <div class="action-btn" id="commentBtn">
          <i class="fas fa-comment-dots"></i>
          <span>340</span>
        </div>
      </div>
    </div>
  </div>

  <nav>
    <div class="nav-item active" data-target="home"><i class="fas fa-home"></i>Home</div>
    <div class="nav-item" data-target="discover"><i class="fas fa-search"></i>Discover</div>
    <div class="nav-item" data-target="upload"><i class="fas fa-plus-square upload-icon"></i></div>
    <div class="nav-item" data-target="inbox"><i class="fas fa-comment-alt"></i>Inbox</div>
    <div class="nav-item" data-target="profile"><i class="fas fa-user"></i>Profile</div>
  </nav>

  <div class="slide-screen" id="inboxScreen">
    <div class="screen-header">
      <h2>Inbox</h2>
      <i class="fas fa-times" onclick="closeScreen('inboxScreen')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body" id="inboxList"></div>
  </div>

  <div class="slide-screen" id="discoverScreen">
    <div class="screen-header">
      <h2>Discover Channels</h2>
      <i class="fas fa-times" onclick="closeScreen('discoverScreen')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body" id="discoverContainer"></div>
  </div>

  <div class="slide-screen" id="chatScreen">
    <div class="screen-header">
      <i class="fas fa-arrow-left" onclick="closeScreen('chatScreen')" style="font-size:20px; cursor:pointer;"></i>
      <h2 id="chatTitle">Loading Chat...</h2>
      <div></div>
    </div>
    <div class="screen-body" id="chatMessages" style="display:flex; flex-direction:column;"></div>
    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Send a message...">
      <button onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <div class="slide-screen" id="createGroupModal" style="background: rgba(10,5,18,0.95); z-index: 25000;">
    <div class="screen-header">
      <h2>New Group Chat Room</h2>
      <i class="fas fa-times" onclick="closeScreen('createGroupModal')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body" style="display:flex; flex-direction:column; justify-content:center; gap:20px;">
        <input type="text" id="groupNameInput" placeholder="Enter Group Name..." style="padding:15px; background:var(--panel-dark); border:1px solid var(--border-purple); border-radius:8px; color:white;">
        <button class="group-btn" onclick="createGroupChatFromModal()">Launch Group Room</button>
    </div>
  </div>

  <div class="slide-screen" id="profileScreen">
    <div class="screen-header">
      <i class="fas fa-arrow-left" onclick="closeScreen('profileScreen')" style="font-size:20px; cursor:pointer;"></i>
      <h2>View Profile</h2>
      <div></div>
    </div>
    <div class="screen-body" id="profileBody"></div>
  </div>

  <div class="slide-screen" id="authOverlayCustom" style="z-index: 30000;">
    <div class="screen-header">
      <h2>Owner Identity Required</h2>
      <i class="fas fa-times" onclick="closeScreen('authOverlayCustom')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body" style="display:flex; flex-direction:column; justify-content:center; padding:30px; gap:15px;">
        <input type="email" id="adminEmailField" placeholder="admin@painx.com" style="padding:15px; background:var(--panel-dark); border:1px solid var(--border-purple); color:white; border-radius:8px;">
        <button class="group-btn" onclick="submitAdminAuth()">Verify Access</button>
    </div>
  </div>

  <div class="slide-screen" id="adminDashboardCustom" style="z-index: 35000; background: #0f0a1c;">
    <div class="screen-header">
      <h2 style="color:#fe2c55;"><i class="fas fa-crown"></i> painX Admin</h2>
      <i class="fas fa-times" onclick="closeScreen('adminDashboardCustom')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body">
      <h3>System Operations</h3>
      <p style="color:#888; margin-top:10px;">Total active simulated sessions up to date.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
