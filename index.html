<!-- Inside index.html, ensure your main body looks exactly like this -->
<body>

  <!-- Video Main Page Feed -->
  <div class="feed-container" id="feedContainer">
    <div class="video-card">
      <video src="your_placeholder_video.mp4" loop autoplay muted></video>
      
      <!-- Top Channels -->
      <div class="top-nav">
        <span>Following</span>
        <span class="active">For You</span>
      </div>

      <!-- Left Bottom Overlay Info -->
      <div class="video-info">
        <h3 onclick="openProfile('pain X AI', true)">pain X AI <i class="fas fa-check-circle verified-badge"></i> <button class="follow-text-btn" onclick="toggleFollow(this); event.stopPropagation();">Follow</button></h3>
        <p>Welcome to pain X. Try tapping my badge!</p>
      </div>

      <!-- Right Side Bar Controls -->
      <div class="side-buttons">
        <div class="profile-avatar-wrap" onclick="openProfile('pain X AI', true)">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=pain X AI">
          <button class="follow-sub-btn" id="subFollowBtn">+</button>
        </div>
        <div class="action-btn" id="likeBtn">
          <i class="fas fa-heart"></i>
          <span>12.3K</span>
        </div>
        <div class="action-btn" id="commentBtn">
          <i class="fas fa-comment-dots"></i>
          <span>340</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FIXED SYSTEM BOTTOM NAVIGATION BAR -->
  <nav>
    <div class="nav-item active" data-target="home"><i class="fas fa-home"></i>Home</div>
    <div class="nav-item" data-target="discover"><i class="fas fa-search"></i>Discover</div>
    <div class="nav-item"><i class="fas fa-plus-square upload-icon"></i></div>
    <div class="nav-item" data-target="inbox"><i class="fas fa-comment-alt"></i>Inbox</div>
    <div class="nav-item" data-target="profile"><i class="fas fa-user"></i>Profile</div>
  </nav>

  <!-- INBOX SLIDE-UP WINDOW -->
  <div class="slide-screen" id="inboxScreen">
    <div class="screen-header">
      <h2>Inbox</h2>
      <i class="fas fa-times" onclick="closeScreen('inboxScreen')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body">
      <button class="group-btn" onclick="createGroupChat()">+ Create Group Chat</button>
      <div id="inboxList">
        <!-- Verified AI Profile Row inside Inbox -->
        <div class="inbox-item" onclick="startChat('pain X AI', true)">
          <div class="inbox-meta">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=pain X AI" style="border: 1px solid #fe2c55;">
            <div>
              <h4>pain X AI <i class="fas fa-check-circle verified-badge"></i></h4>
              <p style="color: #fe2c55; font-size: 12px; font-weight: bold;">Tap to chat with AI</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SEAMLESS LIVE CHAT INTERFACE WINDOW -->
  <div class="slide-screen" id="chatScreen">
    <div class="screen-header">
      <i class="fas fa-arrow-left" onclick="closeScreen('chatScreen')" style="font-size:20px; cursor:pointer;"></i>
      <h2 id="chatTitle">Chat</h2>
      <div></div>
    </div>
    <div class="screen-body" id="chatMessages" style="display:flex; flex-direction:column;"></div>
    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Send a message...">
      <button onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <!-- COMMENTS SYSTEM MODULE WINDOW -->
  <div class="slide-screen" id="commentScreen">
    <div class="screen-header">
      <h2>Comments</h2>
      <i class="fas fa-times" onclick="closeScreen('commentScreen')" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div class="screen-body" id="commentsContainer"></div>
    <div class="chat-footer">
      <input type="text" id="commentInput" placeholder="Add comment...">
      <button onclick="postComment()">Post</button>
    </div>
  </div>

  <!-- PUBLIC USER PROFILE SCREEN OVERLAY -->
  <div class="slide-screen" id="profileScreen">
    <div class="screen-header">
      <i class="fas fa-arrow-left" onclick="closeScreen('profileScreen')" style="font-size:20px; cursor:pointer;"></i>
      <h2>Profile</h2>
      <div></div>
    </div>
    <div class="screen-body" id="profileBody"></div>
  </div>

</body>
